name: CI

on:
  push:
  pull_request:

env:
  LUMINESK_REGISTRY_URL: "https://gist.github.com/Taskov1ch/27b513878dc2a9c0c29f97423a3bc566/raw"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            ubuntu-latest,
            macos-latest,
            windows-latest,
            ubuntu-24.04-arm,
            windows-11-arm,
            macos-15-intel,
          ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install deps
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest

  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            ubuntu-latest,
            macos-latest,
            windows-latest,
            ubuntu-24.04-arm,
            windows-11-arm,
            macos-15-intel,
          ]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install deps
        run: uv sync --locked --extra build


      - name: Build binary (smoke test only)
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   OS_NAME="linux" ;;
            macOS)   OS_NAME="darwin" ;;
            Windows) OS_NAME="windows" ;;
          esac

          ARCH=$(uname -m | tr '[:upper:]' '[:lower:]')
          if [[ "$ARCH" == "x86_64" || "$ARCH" == "amd64" ]]; then
            ARCH="amd64"
          elif [[ "$ARCH" == "aarch64" || "$ARCH" == "arm64" ]]; then
            ARCH="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi

          NAME="luminesk-$OS_NAME-$ARCH"

          echo "Building $NAME"

          uv run pyinstaller \
            --onefile \
            --name "$NAME" \
            --exclude-module setuptools \
            --exclude-module distutils \
            --exclude-module unittest \
            --exclude-module tkinter \
            luminesk/__main__.py

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BIN="dist/$NAME.exe"
          else
            BIN="dist/$NAME"
          fi
          chmod +x "$BIN" || true

          # smoke tests
          ./"$BIN" --help
          ./"$BIN" --version
