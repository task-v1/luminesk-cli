name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install Python dev dependencies
        run: uv sync --locked --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy luminesk

      - name: Formatting check (project scripts)
        run: uv run ruff format --check scripts

  docs:
    name: Docs checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm --dir docs install --frozen-lockfile

      - name: Type check docs site
        run: pnpm --dir docs typecheck

      - name: Build docs site
        run: pnpm --dir docs build

  test:
    name: Test (${{ matrix.os }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            ubuntu-latest,
            macos-latest,
            windows-latest,
            ubuntu-24.04-arm,
            windows-11-arm,
            macos-15-intel,
          ]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install deps
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest

  build:
    name: Build (${{ matrix.os }})
    needs:
      - test
      - docs
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          [
            ubuntu-latest,
            macos-latest,
            windows-latest,
            ubuntu-24.04-arm,
            windows-11-arm,
            macos-15-intel,
          ]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install deps
        run: uv sync --locked --extra build

      - name: Build binary (smoke test only)
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   OS_NAME="linux" ;;
            macOS)   OS_NAME="darwin" ;;
            Windows) OS_NAME="windows" ;;
          esac

          ARCH=$(uname -m | tr '[:upper:]' '[:lower:]')
          if [[ "$ARCH" == "x86_64" || "$ARCH" == "amd64" ]]; then
            ARCH="amd64"
          elif [[ "$ARCH" == "aarch64" || "$ARCH" == "arm64" ]]; then
            ARCH="arm64"
          else
            echo "Unsupported architecture: $ARCH"
            exit 1
          fi

          NAME="luminesk-$OS_NAME-$ARCH"

          echo "Building $NAME"

          uv run pyinstaller \
            --onefile \
            --name "$NAME" \
            --exclude-module setuptools \
            --exclude-module distutils \
            --exclude-module unittest \
            --exclude-module tkinter \
            luminesk/__main__.py

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            BIN="dist/$NAME.exe"
          else
            BIN="dist/$NAME"
          fi
          chmod +x "$BIN" || true

          # smoke tests
          ./"$BIN" --help
          ./"$BIN" --version
