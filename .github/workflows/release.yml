name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.0)"
        required: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  guard:
    name: Guard (safety check)
    runs-on: ubuntu-latest
    outputs:
      ok: ${{ steps.check.outputs.ok }}

    steps:
      - name: Validate release source
        id: check
        run: |
          echo "Ref: $GITHUB_REF"
          echo "Event: $GITHUB_EVENT_NAME"

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Release (${{ matrix.os }}-${{ matrix.arch }})
    needs: [guard, ci]
    if: needs.guard.outputs.ok == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            os_name: linux
            arch: amd64
          - os: macos-latest
            os_name: darwin
            arch: arm64
          - os: windows-latest
            os_name: windows
            arch: amd64
          - os: ubuntu-24.04-arm
            os_name: linux
            arch: arm64
          - os: windows-11-arm
            os_name: windows
            arch: arm64
          - os: macos-15-intel
            os_name: darwin
            arch: amd64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install deps
        run: uv sync --extra build

      - name: Build binary
        shell: bash
        run: |
          OS_NAME="${{ matrix.os_name }}"
          ARCH="${{ matrix.arch }}"
          NAME="luminesk-$OS_NAME-$ARCH"

          uv run pyinstaller \
            --onefile \
            --name "$NAME" \
            --exclude-module setuptools \
            --exclude-module distutils \
            --exclude-module unittest \
            --exclude-module tkinter \
            luminesk/__main__.py

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "BINARY_NAME=$NAME.exe" >> $GITHUB_ENV
          else
            echo "BINARY_NAME=$NAME" >> $GITHUB_ENV
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.os }}
          path: dist/${{ env.BINARY_NAME }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
